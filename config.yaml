# Junk Filter MCP — 部署者配置

# LLM 配置（必填）
# LLM 配置（必填 — 通过环境变量设置或直接编辑此文件）
llm:
  provider: "openai"
  model: "openai/gpt-4o"            # 任意 OpenAI 兼容模型
  api_key: ""                       # JUNK_FILTER_API_KEY 环境变量 或 直接填写
  api_base: "https://openrouter.ai/api/v1"  # 空则用 OpenAI 官方
  temperature: 0.7
  max_tokens: 500

# RSS 源（可留空，通过 add_feed 工具动态添加）
feeds: []

# 评估行为
evaluation:
  innovation_weight: 0.5    # 创新度权重
  depth_weight: 0.5         # 深度权重
  min_interesting_score: 7  # 高于此分才标记为 INTERESTING

# 数据库
database:
  path: "./junk_filter.db"  # SQLite 文件路径
